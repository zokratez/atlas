services:
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-atlas
    restart: unless-stopped
    command: gateway run
    ports:
      - "127.0.0.1:8642:8642"
      - "127.0.0.1:9119:9119"
    volumes:
      - ./hermes-data:/opt/data
    environment:
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_HOST=0.0.0.0
      - HERMES_DASHBOARD_PORT=9119
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
